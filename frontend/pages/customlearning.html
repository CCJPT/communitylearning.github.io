<!DOCTYPE html>
<html lang="en">
<head>
    <title>Community Learning - Custom</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles/customlearning.css">
</head>
<body>

<div class="header">
    <h1>Community Learning</h1>
    <img src="https://cdn.discordapp.com/attachments/1495923678704173247/1500531680581255229/Untitled31_20260503091659.png?ex=69f8c687&is=69f77507&hm=d4a5738414f53ce80d2ee380067a6b9505ab04540a0c6cf0ff45d317267a3a90" width="150">
</div>

<div class="navbar">
    <div class="nav-links">
        <!-- Using "/" tells Flask to go to the main index route -->
        <a href="/">Home</a> 
        <a href="customlearning.html">Custom Learning</a>
    </div>
    <a href="#" class="signup-btn">Signup</a>
</div>

<div class="main-content">
    <div class="card">
        <!-- Added topic-title ID so the script can update it[cite: 7] -->
        <h2 id="topic-title">Custom Learning Dashboard</h2>
        
        <div class="search-container">
            <input type="text" id="topic-input" placeholder="Enter a topic...">
            <!-- Added onclick attribute -->
            <button id="generate-btn" onclick="generateNewPath()">Generate</button>
        </div>

        <!-- Added image element for Gemini output -->
        <div id="ai-image-container">
            <img id="ai-generated-image" src="" alt="" style="max-width:100%; border-radius:8px; display:none;">
        </div>

        <div id="text-content">
            <p>Your curriculum will appear here.</p>
        </div>

        <!-- Added video grid for YouTube results[cite: 1, 7] -->
        <div id="yt-player-grid" class="video-grid"></div>
    </div>
</div>



<div class="footer">
    <p>© 2026 Community Learning</p>
</div>

<!-- DO NOT DELETE-->
<script>
async function generateNewPath() {
    const topicInput = document.getElementById('topic-input');
    const topic = topicInput.value;
    const generateBtn = document.getElementById('generate-btn');
    
    // Safety check
    if (!topic) {
        alert("Please enter a topic first!");
        return;
    }

    // UI Feedback: Show the user something is happening
    generateBtn.innerText = "Generating...";
    generateBtn.disabled = true;

    try {
        // 1. CALL THE BACKEND
        const response = await fetch('/api/generate-all', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ topic: topic })
    });

    const data = await response.json();

    // Check if data.curriculum exists before using it
    if (data.curriculum) {
        document.getElementById('text-content').innerHTML = data.curriculum;
    } else {
        console.error("Payload missing curriculum data:", data);
    }

        // 2. INJECT THE CURRICULUM
        document.getElementById('topic-title').innerText = topic;
        document.getElementById('text-content').innerHTML = data.curriculum;

        // 3. INJECT THE IMAGE (if applicable)
        const imgElement = document.getElementById('ai-generated-image');
        if (data.image_url) {
            imgElement.src = data.image_url + '?t=' + new Date().getTime(); // Refresh image
            imgElement.style.display = 'block';
        }

        // 4. INJECT THE VIDEOS
        const videoGrid = document.getElementById('yt-player-grid');
        videoGrid.innerHTML = data.videos.map(video => `
            <div class="video-card">
                <h4>${video.title}</h4>
                <iframe width="100%" height="200" src="${video.url}" frameborder="0" allowfullscreen></iframe>
            </div>
        `).join('');

    } catch (error) {
        console.error("Connection failed:", error);
        alert("Make sure your Python app.py is running!");
    } finally {
        // Reset the button
        generateBtn.innerText = "Generate";
        generateBtn.disabled = false;
    }
}
</script>


</body>
</html>
