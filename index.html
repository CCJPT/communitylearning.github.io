<!DOCTYPE html>
<html lang="en">
<head>
<title>Community Learning</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  font-family: Arial, Helvetica, sans-serif;
  margin: 0;
}

/* Header n logo Title */
.header {
  padding: 10px;
  text-align: left;
  background: #faac48;;
  color: white;
}

/* heading word size */
.header h1 {
  font-size: 30px;
}

/* top navigation bar */
.navbar {
  overflow: hidden;
  background-color: #855e32;
}

/* links / let JP fix*/
.navbar a {
  float: left;
  display: block;
  color: white;
  text-align: center;
  padding: 14px 30px;
  text-decoration: none;
}

/* Sidebar/left column */
.side {
  -ms-flex: 30%; /* IE10 */
  flex: 30%;
  background-color: #f1f1f1;
  padding: 20px;
}

/* Main column */
.main {   
  -ms-flex: 70%; /* IE10 */
  flex: 70%;
  background-color: white;
  padding: 20px;
}

/* Footer */
.footer {
  padding: 20px;
  text-align: center;
  background: #ddd;
}

/* when the screen is less than 400px wide, make the navigation links stack on top of each other instead of next to each other */
@media screen and (max-width: 400px) {
  .navbar a {
    float: none;
    width: 100%;
  }
}

</style>
</head>
<body>

<div class="header">
  <h1>Community Learning</h1>
</div>

<div class="navbar">
/* u got this JP */
</div>

<div class="row">
  <div class="side">
    <h2>About Us</h2>
    <p>Some text about me.</p>
</body>
</html>
