<style>
body {
  font-family: Arial, Helvetica, sans-serif;
  background-color: #FFFFFF;
  display: flex;
  justify-content: center;
  padding: 50px 20px;
  margin: 0;
}

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 600px;
    text-align: center;
}

h1 {
    font-size: 2.5rem;
    margin: 0;
    text-transform: uppercase;
}

.subtitle {
    margin-top: 5px;
    font-style: italic;
    color: #555;
}

.wavy {
    font-size: 2rem;
    margin: 20px 0;
    letter-spacing: -3px;
}

/* Section 2: About Us (The Vertical Text Layout) */
.about-section {
    display: flex;
    align-items: flex-start;
    margin: 40px 0;
}

.vertical-text {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-weight: bold;
    font-size: 1.5rem;
    margin-right: 15px;
    text-transform: uppercase;
}

.box {
    border: 4px solid black;
    padding: 30px;
    width: 350px;
    min-height: 200px;
    text-align: left;
}

/* Section 3: Questions */
.questions {
    font-weight: bold;
    font-size: 1.8rem;
    text-transform: uppercase;
}

</style>
</head>
