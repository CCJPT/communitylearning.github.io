<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
    <!-- White Background -->
    <rect x="0" y="0" width="1200" height="800" fill="#FFFFFF"/>

    <!-- Title -->
    <text x="600" y="50" font-size="36" font-weight="bold" fill="#333333" text-anchor="middle">
        Maintaining Your New Home
    </text>

    <!-- Main House Illustration -->
    <g id="house" transform="translate(450, 250)">
        <!-- Foundation -->
        <rect x="0" y="150" width="300" height="30" fill="#B0B0B0" stroke="#888888" stroke-width="2"/>
        <!-- Walls -->
        <rect x="0" y="50" width="300" height="100" fill="#E0E0E0" stroke="#AAAAAA" stroke-width="2"/>
        <!-- Roof -->
        <polygon points="0,50 150,0 300,50" fill="#8B4513" stroke="#6B2E0A" stroke-width="2"/>
        <!-- Door -->
        <rect x="130" y="100" width="40" height="50" fill="#A0522D" stroke="#8B4513" stroke-width="1.5"/>
        <circle cx="160" cy="125" r="3" fill="#333333"/>
        <!-- Window 1 -->
        <rect x="40" y="70" width="40" height="30" fill="#A7D9F0" stroke="#77AABB" stroke-width="1"/>
        <line x1="60" y1="70" x2="60" y2="100" stroke="#77AABB" stroke-width="1"/>
        <line x1="40" y1="85" x2="80" y2="85" stroke="#77AABB" stroke-width="1"/>
        <!-- Window 2 -->
        <rect x="220" y="70" width="40" height="30" fill="#A7D9F0" stroke="#77AABB" stroke-width="1"/>
        <line x1="240" y1="70" x2="240" y2="100" stroke="#77AABB" stroke-width="1"/>
        <line x1="220" y1="85" x2="260" y2="85" stroke="#77AABB" stroke-width="1"/>
        <text x="150" y="120" font-size="16" fill="#444444" text-anchor="middle">Your New Home</text>
    </g>

    <!-- Maintenance Sections -->

    <!-- 1. Roof & Gutters -->
    <g id="roof-gutters" transform="translate(100, 100)">
        <path d="M50 0 L100 25 L0 25 Z" fill="#CC6633" stroke="#A04020" stroke-width="2"/> <!-- Roof part -->
        <rect x="0" y="25" width="100" height="10" fill="#999999" stroke="#777777" stroke-width="1"/> <!-- Gutter -->
        <path d="M90 35 L85 50 L95 50 Z" fill="#4CAF50"/> <!-- Leaf -->
        <path d="M50 40 L50 60 L60 55 L50 40" fill="#2196F3"/> <!-- Water drop -->
        <text x="50" y="80" font-size="18" font-weight="bold" fill="#333333" text-anchor="middle">Roof & Gutters</text>
        <text x="50" y="105" font-size="14" fill="#555555" text-anchor="middle">Inspect & Clean Regularly</text>
        <line x1="100" y1="50" x2="450" y2="280" stroke="#AAAAAA" stroke-dasharray="5,5"/>
    </g>

    <!-- 2. Exterior & Seals -->
    <g id="exterior-seals" transform="translate(900, 100)">
        <rect x="0" y="0" width="80" height="60" fill="#A7D9F0" stroke="#77AABB" stroke-width="2"/> <!-- Window -->
        <line x1="0" y1="30" x2="80" y2="30" stroke="#77AABB" stroke-width="2"/>
        <line x1="40" y1="0" x2="40" y2="60" stroke="#77AABB" stroke-width="2"/>
        <rect x="-10" y="10" width="100" height="40" fill="none" stroke="#FFD700" stroke-width="2" rx="5" ry="5"/> <!-- Seal -->
        <text x="40" y="90" font-size="18" font-weight="bold" fill="#333333" text-anchor="middle">Exterior & Seals</text>
        <text x="40" y="115" font-size="14" fill="#555555" text-anchor="middle">Check Siding, Paint & Weatherseals</text>
        <line x1="0" y1="50" x2="-350" y2="230" stroke="#AAAAAA" stroke-dasharray="5,5"/>
    </g>

    <!-- 3. Foundation & Grading -->
    <g id="foundation-grading" transform="translate(100, 600)">
        <rect x="0" y="20" width="100" height="40" fill="#B0B0B0" stroke="#888888" stroke-width="2"/> <!-- Foundation -->
        <path d="M0 60 C25 50 75 50 100 60 L100 70 L0 70 Z" fill="#9CCC65"/> <!-- Soil grading -->
        <line x1="10" y1="30" x2="90" y2="30" stroke="#FF0000" stroke-width="2"/> <!-- Crack line -->
        <line x1="50" y1="0" x2="50" y2="20" stroke="#607D8B" stroke-width="2"/> <!-- Level indicator -->
        <text x="50" y="90" font-size="18" font-weight="bold" fill="#333333" text-anchor="middle">Foundation & Grading</text>
        <text x="50" y="115" font-size="14" fill="#555555" text-anchor="middle">Monitor for Cracks, Ensure Proper Slope</text>
        <line x1="100" y1="50" x2="450" y2="370" stroke="#AAAAAA" stroke-dasharray="5,5"/>
    </g>

    <!-- 4. Landscaping & Drainage -->
    <g id="landscaping-drainage" transform="translate(900, 600)">
        <circle cx="50" cy="40" r="30" fill="#4CAF50"/> <!-- Bush -->
        <rect x="45" y="60" width="10" height="20" fill="#795548"/> <!-- Trunk -->
        <rect x="0" y="60" width="100" height="20" fill="#9CCC65"/> <!-- Grass -->
        <path d="M10 70 C20 60 80 60 90 70" fill="none" stroke="#2196F3" stroke-width="3"/> <!-- Water flow -->
        <text x="50" y="100" font-size="18" font-weight="bold" fill="#333333" text-anchor="middle">Landscaping & Drainage</text>
        <text x="50" y="125" font-size="14" fill="#555555" text-anchor="middle">Trim Plants, Ensure Water Drains Away</text>
        <line x1="0" y1="70" x2="-350" y2="370" stroke="#AAAAAA" stroke-dasharray="5,5"/>
    </g>

    <!-- 5. HVAC System -->
    <g id="hvac" transform="translate(180, 280)">
        <rect x="0" y="0" width="80" height="60" fill="#B0B0B0" stroke="#888888" stroke-width="2"/> <!-- HVAC unit -->
        <circle cx="40" cy="30" r="20" fill="#DDDDDD" stroke="#AAAAAA" stroke-width="1"/> <!-- Fan/Filter -->
        <line x1="25" y1="30" x2="55" y2="30" stroke="#666666" stroke-width="2"/>
        <line x1="40" y1="15" x2="40" y2="45" stroke="#666666" stroke-width="2"/>
        <path d="M60 10 L70 0 M60 50 L70 60 M10 10 L0 0 M10 50 L0 60" stroke="#FF5722" stroke-width="2"/> <!-- Air flow indicators -->
        <text x="40" y="90" font-size="18" font-weight="bold" fill="#333333" text-anchor="middle">HVAC System</text>
        <text x="40" y="115" font-size="14" fill="#555555" text-anchor="middle">Change Filters, Schedule Inspections</text>
        <line x1="80" y1="30" x2="450" y2="300" stroke="#AAAAAA" stroke-dasharray="5,5"/>
    </g>

    <!-- 6. Plumbing -->
    <g id="plumbing" transform="translate(740, 280)">
        <path d="M30 0 C40 0 50 10 50 20 L50 50 C50 60 40 60 30 60 C20 60 10 60 10 50 L10 20 C10 10 20 0 30 0 Z" fill="#BBDEFB" stroke="#64B5F6" stroke-width="2"/> <!-- Faucet/Tap -->
        <path d="M30 60 L30 70 M25 65 L35 65" stroke="#2196F3" stroke-width="2"/> <!-- Drip -->
        <path d="M35 75 L30 85 L40 85 Z" fill="#2196F3"/> <!-- Water droplet -->
        <text x="30" y="110" font-size="18" font-weight="bold" fill="#333333" text-anchor="middle">Plumbing</text>
        <text x="30" y="135" font-size="14" fill="#555555" text-anchor="middle">Check for Leaks, Test Water Pressure</text>
        <line x1="0" y1="30" x2="-290" y2="300" stroke="#AAAAAA" stroke-dasharray="5,5"/>
    </g>

    <!-- 7. Electrical & Safety -->
    <g id="electrical-safety" transform="translate(180, 450)">
        <circle cx="20" cy="20" r="15" fill="#E0E0E0" stroke="#AAAAAA" stroke-width="2"/> <!-- Smoke Detector -->
        <path d="M10 20 C10 10 30 10 30 20 C30 30 10 30 10 20" fill="none" stroke="#FF0000" stroke-width="1.5"/> <!-- Speaker lines -->
        <circle cx="60" cy="20" r="15" fill="#FFECB3" stroke="#FFC107" stroke-width="2"/> <!-- Lightbulb -->
        <rect x="55" y="35" width="10" height="5" fill="#FFC107"/>
        <text x="40" y="65" font-size="18" font-weight="bold" fill="#333333" text-anchor="middle">Electrical & Safety</text>
        <text x="40" y="90" font-size="14" fill="#555555" text-anchor="middle">Test Smoke Detectors, Check Outlets</text>
        <line x1="80" y1="30" x2="450" y2="390" stroke="#AAAAAA" stroke-dasharray="5,5"/>
    </g>

    <!-- 8. Documentation & Warranties -->
    <g id="documentation" transform="translate(740, 450)">
        <rect x="0" y="0" width="60" height="70" fill="#BBDEFB" stroke="#64B5F6" stroke-width="2" rx="5" ry="5"/> <!-- Binder -->
        <rect x="5" y="5" width="50" height="60" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/> <!-- Pages -->
        <line x1="15" y1="15" x2="45" y2="15" stroke="#64B5F6" stroke-width="1"/>
        <line x1="15" y1="25" x2="45" y2="25" stroke="#64B5F6" stroke-width="1"/>
        <path d="M0 10 C-10 10 -10 60 0 60" fill="none" stroke="#64B5F6" stroke-width="2"/> <!-- Binder spine -->
        <text x="30" y="90" font-size="18" font-weight="bold" fill="#333333" text-anchor="middle">Documentation</text>
        <text x="30" y="115" font-size="14" fill="#555555" text-anchor="middle">Keep Manuals, Warranties & Checklists</text>
        <line x1="0" y1="30" x2="-290" y2="390" stroke="#AAAAAA" stroke-dasharray="5,5"/>
    </g>

    <!-- Central House Label -->
    <text x="600" y="380" font-size="20" font-weight="bold" fill="#333333" text-anchor="middle">Your New Home: A Maintenance Guide</text>

</svg>