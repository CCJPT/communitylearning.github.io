<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
    <!-- White Background -->
    <rect x="0" y="0" width="1200" height="800" fill="white"/>

    <!-- Title -->
    <text x="600" y="40" font-size="36" font-weight="bold" fill="#333" text-anchor="middle">Car Maintenance Checklist</text>

    <!-- Main Car Body Outline (simplified hood/engine bay area) -->
    <g transform="translate(150, 80)">
        <path d="M100 0 H800 L750 150 H150 L100 0 Z" fill="#E0E0E0" stroke="#888" stroke-width="3"/>
        <path d="M100 0 C50 50, 50 250, 100 300 H800 C850 250, 850 50, 800 0 Z" fill="#C0C0C0" stroke="#888" stroke-width="3"/>
        <path d="M150 150 H750 V400 H150 Z" fill="#D0D0D0" stroke="#888" stroke-width="3"/>
        <text x="450" y="270" font-size="28" font-weight="bold" fill="#666" text-anchor="middle">ENGINE BAY</text>
    </g>

    <!-- 1. Oil & Filter Change -->
    <g transform="translate(200, 450)">
        <rect x="0" y="0" width="180" height="120" rx="10" ry="10" fill="#333"/>
        <rect x="10" y="10" width="160" height="100" rx="5" ry="5" fill="#555"/>
        <circle cx="90" cy="90" r="25" fill="#C70039"/> <!-- Oil Filter -->
        <path d="M90 70 V30 H120 V50 C130 50, 130 70, 120 70 Z" fill="#FFC300" stroke="#DAA520" stroke-width="2"/> <!-- Oil spout -->
        <text x="90" y="20" font-size="14" fill="white" text-anchor="middle">Oil</text>
        <path d="M120 15 L110 30 L130 30 Z" fill="#FFC300"/> <!-- Oil drip -->

        <path d="M-20 60 L-35 50 L-35 70 L-20 60 M-35 50 H-60 V70 H-35" fill="#AAA" stroke="#888" stroke-width="2"/> <!-- Wrench head -->
        <rect x="-80" y="55" width="20" height="10" fill="#AAA" stroke="#888" stroke-width="2"/> <!-- Wrench handle -->
        
        <text x="90" y="150" font-size="20" font-weight="bold" fill="#222" text-anchor="middle">Oil & Filter Change</text>
        <line x1="90" y1="120" x2="300" y2="350" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>
    </g>

    <!-- 2. Fluids Check (Coolant, Washer, Brake) -->
    <g transform="translate(250, 180)">
        <!-- Coolant -->
        <rect x="0" y="0" width="80" height="100" rx="10" ry="10" fill="#E8F6FA" stroke="#666" stroke-width="2"/>
        <rect x="10" y="40" width="60" height="50" rx="5" ry="5" fill="#4CAF50"/> <!-- Green Coolant -->
        <text x="40" y="120" font-size="16" font-weight="bold" fill="#222" text-anchor="middle">Coolant Level</text>
        <line x1="40" y1="100" x2="320" y2="200" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>

        <!-- Washer Fluid -->
        <rect x="120" y="0" width="80" height="100" rx="10" ry="10" fill="#E8F6FA" stroke="#666" stroke-width="2"/>
        <rect x="130" y="40" width="60" height="50" rx="5" ry="5" fill="#9C27B0"/> <!-- Purple Washer Fluid -->
        <text x="160" y="120" font-size="16" font-weight="bold" fill="#222" text-anchor="middle">Washer Fluid</text>
        <line x1="160" y1="100" x2="400" y2="180" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>

        <!-- Brake Fluid -->
        <rect x="240" y="0" width="80" height="100" rx="10" ry="10" fill="#E8F6FA" stroke="#666" stroke-width="2"/>
        <rect x="250" y="40" width="60" height="50" rx="5" ry="5" fill="#F44336"/> <!-- Red Brake Fluid -->
        <text x="280" y="120" font-size="16" font-weight="bold" fill="#222" text-anchor="middle">Brake Fluid</text>
        <line x1="280" y1="100" x2="450" y2="150" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>
    </g>

    <!-- 3. Battery Check -->
    <g transform="translate(600, 100)">
        <rect x="0" y="0" width="150" height="90" rx="10" ry="10" fill="#424242" stroke="#222" stroke-width="3"/>
        <rect x="10" y="10" width="130" height="70" rx="5" ry="5" fill="#616161"/>
        <circle cx="30" cy="25" r="10" fill="#FFEB3B"/>
        <text x="30" y="28" font-size="18" font-weight="bold" fill="#424242" text-anchor="middle">+</text>
        <circle cx="120" cy="25" r="10" fill="#FFEB3B"/>
        <text x="120" y="28" font-size="18" font-weight="bold" fill="#424242" text-anchor="middle">-</text>
        <text x="75" y="115" font-size="20" font-weight="bold" fill="#222" text-anchor="middle">Battery Check</text>
        <line x1="75" y1="90" x2="500" y2="180" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>
    </g>

    <!-- 4. Air Filter Inspection -->
    <g transform="translate(800, 180)">
        <rect x="0" y="0" width="120" height="80" rx="10" ry="10" fill="#BDBDBD" stroke="#666" stroke-width="2"/>
        <path d="M10 10 H110 V70 H10 V10 Z M20 20 H100 V60 H20 Z" fill="#F8E71C"/> <!-- Filter pleats -->
        <path d="M115 40 L125 40 M120 35 V45" stroke="#666" stroke-width="2"/> <!-- Clip -->
        <text x="60" y="105" font-size="20" font-weight="bold" fill="#222" text-anchor="middle">Air Filter</text>
        <line x1="60" y1="80" x2="600" y2="250" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>
    </g>

    <!-- 5. Tire Pressure & Rotation (Single wheel example) -->
    <g transform="translate(150, 600)">
        <circle cx="80" cy="80" r="70" fill="#333" stroke="#222" stroke-width="3"/> <!-- Tire -->
        <circle cx="80" cy="80" r="50" fill="#9E9E9E" stroke="#757575" stroke-width="2"/> <!-- Rim -->
        <circle cx="80" cy="80" r="15" fill="#424242"/> <!-- Hub cap -->
        <path d="M100 60 L105 55 L105 65 L100 60 M105 60 L115 60" fill="none" stroke="#666" stroke-width="2"/> <!-- Valve stem -->
        <path d="M115 50 L125 50 L125 70 L115 70 Z M120 50 V70" fill="#AAA" stroke="#888" stroke-width="2"/> <!-- Gauge -->
        
        <!-- Rotation Arrows -->
        <path d="M10 80 A70 70 0 0 1 80 10 M80 10 L70 20 M80 10 L90 20" fill="none" stroke="#FF5722" stroke-width="4"/>
        <path d="M150 80 A70 70 0 0 1 80 150 M80 150 L70 140 M80 150 L90 140" fill="none" stroke="#FF5722" stroke-width="4"/>
        
        <text x="80" y="185" font-size="20" font-weight="bold" fill="#222" text-anchor="middle">Tire Pressure & Rotation</text>
    </g>

    <!-- 6. Brake Inspection (near tire) -->
    <g transform="translate(370, 600)">
        <circle cx="80" cy="80" r="60" fill="#616161" stroke="#424242" stroke-width="2"/> <!-- Rotor -->
        <path d="M40 80 C40 50, 80 30, 120 80 L120 100 C120 130, 80 150, 40 100 Z" fill="#F44336" stroke="#D32F2F" stroke-width="2"/> <!-- Caliper -->
        <text x="80" y="185" font-size="20" font-weight="bold" fill="#222" text-anchor="middle">Brake Inspection</text>
    </g>

    <!-- 7. Wiper Blade Replacement -->
    <g transform="translate(600, 600)">
        <rect x="0" y="0" width="200" height="120" rx="10" ry="10" fill="#E1F5FE" stroke="#666" stroke-width="2"/> <!-- Windshield -->
        <path d="M10 100 C50 80, 150 80, 190 100 M10 90 L190 90" stroke="#424242" stroke-width="6"/> <!-- Wipers -->
        <text x="100" y="150" font-size="20" font-weight="bold" fill="#222" text-anchor="middle">Wiper Blades</text>
        <line x1="100" y1="120" x2="500" y2="450" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>
    </g>

    <!-- 8. Check All Lights -->
    <g transform="translate(850, 600)">
        <rect x="0" y="30" width="60" height="40" rx="5" ry="5" fill="#FFEB3B" stroke="#DAA520" stroke-width="2"/> <!-- Headlight -->
        <path d="M60 50 L100 30 V70 L60 50 Z" fill="#FFFDE7" opacity="0.7"/> <!-- Light beam -->

        <rect x="0" y="90" width="60" height="40" rx="5" ry="5" fill="#F44336" stroke="#D32F2F" stroke-width="2"/> <!-- Taillight -->
        <path d="M60 110 L100 90 V130 L60 110 Z" fill="#FFEBEE" opacity="0.7"/> <!-- Light beam -->
        
        <text x="50" y="150" font-size="20" font-weight="bold" fill="#222" text-anchor="middle">Check All Lights</text>
    </g>

    <!-- Connection Arrows for clarity between labels and diagram parts -->
    <g stroke="#3F51B5" stroke-width="3" fill="none">
        <path d="M300 635 L200 570 M200 570 L210 575 M200 570 L210 565"/> <!-- Tire to Label -->
        <path d="M500 635 L400 570 M400 570 L410 575 M400 570 L410 565"/> <!-- Brake to Label -->
        <path d="M700 635 L600 570 M600 570 L610 575 M600 570 L610 565"/> <!-- Wipers to Label -->
        <path d="M900 635 L800 570 M800 570 L810 575 M800 570 L810 565"/> <!-- Lights to Label -->

        <path d="M480 380 L320 280 M320 280 L330 285 M320 280 L330 275"/> <!-- Oil to Engine Bay -->
        <path d="M480 280 L320 200 M320 200 L330 205 M320 200 L330 195"/> <!-- Coolant to Engine Bay -->
        <path d="M580 280 L420 200 M420 200 L430 205 M420 200 L430 195"/> <!-- Washer to Engine Bay -->
        <path d="M680 280 L520 200 M520 200 L530 205 M520 200 L530 195"/> <!-- Brake Fluid to Engine Bay -->
        <path d="M760 225 L650 150 M650 150 L660 155 M650 150 L660 145"/> <!-- Battery to Engine Bay -->
        <path d="M940 225 L850 150 M850 150 L860 155 M850 150 L860 145"/> <!-- Air Filter to Engine Bay -->
    </g>

</svg>