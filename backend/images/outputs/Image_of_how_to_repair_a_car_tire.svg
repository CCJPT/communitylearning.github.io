<svg width="1250" height="850" viewBox="0 0 1250 850" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .white-bg { fill: white; }
      .panel-bg { fill: #f9f9f9; stroke: #e0e0e0; stroke-width: 1; }
      .tire-body { fill: #212121; }
      .tire-tread { fill: #333333; }
      .rim-silver { fill: #cccccc; stroke: #a0a0a0; stroke-width: 2; }
      .nail-color { fill: #5d4037; stroke: #3a2b25; stroke-width: 1; }
      .tool-handle { fill: #e67e22; }
      .tool-metal { fill: #a0a0a0; stroke: #777; stroke-width: 1; }
      .tool-grip { fill: #34495e; }
      .plug-rubber { fill: #8b4513; }
      .text-label { font-family: 'Arial', sans-serif; font-size: 18px; font-weight: bold; fill: #333333; }
      .sub-label { font-family: 'Arial', sans-serif; font-size: 14px; fill: #555555; }
      .arrow { fill: none; stroke: #e74c3c; stroke-width: 2; marker-end: url(#arrowhead); }
      .leak-bubble { fill: #add8e6; opacity: 0.8; stroke: #6ba8c9; stroke-width: 0.5; }
      .air-hose { fill: #4a69bd; stroke: #345291; stroke-width: 1; }
      .valve-stem { fill: #555; stroke: #333; stroke-width: 0.5; }
      .cutter-blade { fill: #cccccc; stroke: #888; stroke-width: 0.5; }
      .cutter-handle { fill: #555; }
      .removed-plug { fill: #c08040; stroke: #8b4513; stroke-width: 0.5; }
    </style>

    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c" />
    </marker>
  </defs>

  <rect class="white-bg" x="0" y="0" width="100%" height="100%"/>

  <!-- Panel 1: Locate Puncture -->
  <g transform="translate(20, 20)">
    <rect class="panel-bg" x="0" y="0" width="380" height="380" rx="10" ry="10"/>
    <text class="text-label" x="20" y="30">1. Locate Puncture</text>

    <!-- Tire -->
    <circle class="tire-body" cx="190" cy="220" r="120"/>
    <circle class="rim-silver" cx="190" cy="220" r="70"/>
    <path class="tire-tread" d="M 190 100 A 120 120 0 0 1 190 340 A 120 120 0 0 0 190 100 Z" style="transform: rotate(15deg) scaleY(0.95); transform-origin: 190px 220px;"/>
    <path class="tire-tread" d="M 190 100 A 120 120 0 0 1 190 340 A 120 120 0 0 0 190 100 Z" style="transform: rotate(-15deg) scaleY(0.95); transform-origin: 190px 220px;"/>
    <path class="tire-tread" d="M 190 100 A 120 120 0 0 1 190 340 A 120 120 0 0 0 190 100 Z" style="transform: rotate(45deg) scaleY(0.95); transform-origin: 190px 220px;"/>

    <!-- Nail -->
    <rect class="nail-color" x="220" y="165" width="8" height="60" transform="rotate(45 224 195)"/>
    <polygon class="nail-color" points="218,170 230,170 224,155" transform="rotate(45 224 195)"/>
    <circle fill="#e74c3c" cx="240" cy="205" r="5"/>
    <text class="sub-label" x="250" y="210">Puncture</text>
    <path class="arrow" d="M 210 230 L 235 205"/>
  </g>

  <!-- Panel 2: Prepare the Hole (Reaming) -->
  <g transform="translate(435, 20)">
    <rect class="panel-bg" x="0" y="0" width="380" height="380" rx="10" ry="10"/>
    <text class="text-label" x="20" y="30">2. Prepare the Hole (Ream)</text>

    <!-- Tire cross-section -->
    <rect class="tire-body" x="80" y="150" width="220" height="100" rx="10" ry="10"/>
    <rect class="tire-tread" x="80" y="140" width="220" height="20" rx="5" ry="5"/>
    <rect class="tire-tread" x="80" y="250" width="220" height="20" rx="5" ry="5"/>

    <!-- Hole -->
    <ellipse fill="#666" cx="190" cy="200" rx="8" ry="20" transform="rotate(5 190 200)"/>

    <!-- Reamer Tool -->
    <rect class="tool-handle" x="180" y="50" width="20" height="70" rx="5" ry="5"/>
    <path class="tool-metal" d="M 190 120 L 190 180 L 180 170 L 180 160 L 190 150 L 200 160 L 200 170 Z M 190 180 L 190 230" stroke-width="2"/>
    <circle fill="#34495e" cx="190" cy="90" r="12"/>
    <text class="sub-label" x="210" y="100">Reamer Tool</text>

    <!-- Debris -->
    <circle fill="#999" cx="150" cy="180" r="3"/>
    <circle fill="#999" cx="230" cy="220" r="4"/>
    <circle fill="#999" cx="200" cy="160" r="2"/>
  </g>

  <!-- Panel 3: Load Plug onto Insertion Tool -->
  <g transform="translate(850, 20)">
    <rect class="panel-bg" x="0" y="0" width="380" height="380" rx="10" ry="10"/>
    <text class="text-label" x="20" y="30">3. Load Plug onto Tool</text>

    <!-- Insertion Tool -->
    <rect class="tool-handle" x="180" y="80" width="20" height="70" rx="5" ry="5"/>
    <circle fill="#34495e" cx="190" cy="115" r="12"/>
    <path class="tool-metal" d="M 190 150 L 190 260 C 185 270 195 270 190 260 Z" stroke-width="2"/>
    <circle class="tool-metal" cx="190" cy="270" r="8"/>
    <text class="sub-label" x="210" y="120">Insertion Tool</text>

    <!-- Tire Plug -->
    <rect class="plug-rubber" x="175" y="230" width="30" height="100" rx="5" ry="5"/>
    <text class="sub-label" x="150" y="340">Tire Plug</text>
  </g>

  <!-- Panel 4: Insert Plug into Hole -->
  <g transform="translate(20, 435)">
    <rect class="panel-bg" x="0" y="0" width="380" height="380" rx="10" ry="10"/>
    <text class="text-label" x="20" y="30">4. Insert Plug into Hole</text>

    <!-- Tire cross-section -->
    <rect class="tire-body" x="80" y="150" width="220" height="100" rx="10" ry="10"/>
    <rect class="tire-tread" x="80" y="140" width="220" height="20" rx="5" ry="5"/>
    <rect class="tire-tread" x="80" y="250" width="220" height="20" rx="5" ry="5"/>

    <!-- Hole -->
    <ellipse fill="#666" cx="190" cy="200" rx="10" ry="25" transform="rotate(5 190 200)"/>

    <!-- Insertion Tool with Plug -->
    <rect class="tool-handle" x="180" y="60" width="20" height="70" rx="5" ry="5"/>
    <circle fill="#34495e" cx="190" cy="95" r="12"/>
    <path class="tool-metal" d="M 190 130 L 190 220" stroke-width="2"/>
    <rect class="plug-rubber" x="175" y="195" width="30" height="110" rx="5" ry="5"/>
    <text class="sub-label" x="210" y="100">Tool pushing plug</text>
  </g>

  <!-- Panel 5: Trim Excess Plug -->
  <g transform="translate(435, 435)">
    <rect class="panel-bg" x="0" y="0" width="380" height="380" rx="10" ry="10"/>
    <text class="text-label" x="20" y="30">5. Trim Excess Plug</text>

    <!-- Tire cross-section -->
    <rect class="tire-body" x="80" y="150" width="220" height="100" rx="10" ry="10"/>
    <rect class="tire-tread" x="80" y="140" width="220" height="20" rx="5" ry="5"/>
    <rect class="tire-tread" x="80" y="250" width="220" height="20" rx="5" ry="5"/>

    <!-- Plug in tire -->
    <rect class="plug-rubber" x="180" y="145" width="20" height="110" rx="5" ry="5"/>
    <rect class="plug-rubber" x="180" y="240" width="20" height="15" rx="5" ry="5" transform="rotate(-15 190 240)"/>

    <!-- Cutter -->
    <rect class="cutter-handle" x="240" y="180" width="80" height="20" rx="5" ry="5"/>
    <rect class="cutter-blade" x="230" y="185" width="20" height="10" transform="rotate(-15 230 185)"/>
    <path class="cutter-blade" d="M 230 190 L 195 160 L 205 150 L 240 180 Z" />
    <text class="sub-label" x="250" y="220">Cutter</text>

    <!-- Removed plug piece -->
    <rect class="removed-plug" x="200" y="130" width="15" height="25" rx="3" ry="3" transform="rotate(10 200 130)"/>
  </g>

  <!-- Panel 6: Inflate & Leak Check -->
  <g transform="translate(850, 435)">
    <rect class="panel-bg" x="0" y="0" width="380" height="380" rx="10" ry="10"/>
    <text class="text-label" x="20" y="30">6. Inflate &amp; Leak Check</text>

    <!-- Tire -->
    <circle class="tire-body" cx="190" cy="220" r="120"/>
    <circle class="rim-silver" cx="190" cy="220" r="70"/>
    <path class="tire-tread" d="M 190 100 A 120 120 0 0 1 190 340 A 120 120 0 0 0 190 100 Z" style="transform: rotate(15deg) scaleY(0.95); transform-origin: 190px 220px;"/>
    <path class="tire-tread" d="M 190 100 A 120 120 0 0 1 190 340 A 120 120 0 0 0 190 100 Z" style="transform: rotate(-15deg) scaleY(0.95); transform-origin: 190px 220px;"/>

    <!-- Valve Stem -->
    <rect class="valve-stem" x="195" y="130" width="8" height="20" rx="2" ry="2" transform="rotate(20 199 140)"/>

    <!-- Air hose -->
    <path class="air-hose" d="M 220 100 C 250 80 280 120 270 170 C 260 220 230 240 200 230" stroke="#345291" stroke-width="8" fill="none"/>
    <rect class="tool-metal" x="195" y="215" width="20" height="15" transform="rotate(20 199 220)"/>
    <text class="sub-label" x="270" y="100">Air Hose</text>

    <!-- Repaired Spot (plug visible) -->
    <circle class="plug-rubber" cx="240" cy="280" r="8"/>

    <!-- Leak Check Bubbles -->
    <circle class="leak-bubble" cx="245" cy="270" r="6"/>
    <circle class="leak-bubble" cx="255" cy="260" r="4"/>
    <circle class="leak-bubble" cx="260" cy="248" r="3"/>
    <text class="sub-label" x="200" y="320">No bubbles = No leak!</text>
  </g>

</svg>